name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon --parallel --build-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeoLocate-${{ github.ref_name }}-${{ github.sha }}
          path: build/libs/GeoLocate-*.jar
          retention-days: 7
          compression-level: 9
