name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_title:
        description: 'Release title (optional, defaults to version)'
        required: false
        default: ''

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute next version
        id: next_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ inputs.version_bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEXT" >> $GITHUB_OUTPUT

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^version=.*/version=${{ steps.next_version.outputs.version }}/" gradle.properties

      - name: Build
        run: ./gradlew build --no-daemon --parallel --build-cache

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | head -n 1)
          NEXT_VERSION="v${{ steps.next_version.outputs.version }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%H|%s|%an" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%H|%s|%an" "$PREVIOUS_TAG"..HEAD)
          fi

          REPO="${{ github.repository }}"
          BODY=""

          if [ -n "${{ inputs.release_title }}" ]; then
            BODY="## ${{ inputs.release_title }}"$'\n\n'
          fi

          BODY+="## What's Changed"$'\n\n'

          if [ -z "$COMMITS" ]; then
            BODY+="_No commits since last release._"$'\n'
          else
            while IFS='|' read -r HASH MESSAGE AUTHOR; do
              SHORT="${HASH:0:7}"
              URL="https://github.com/$REPO/commit/$HASH"
              BODY+="- [\`$SHORT\`]($URL) $MESSAGE — **$AUTHOR**"$'\n'
            done <<< "$COMMITS"
          fi

          BODY+=$'\n'

          if [ -n "$PREVIOUS_TAG" ]; then
            COMPARE_URL="https://github.com/$REPO/compare/$PREVIOUS_TAG...$NEXT_VERSION"
            BODY+="**Full diff:** [$PREVIOUS_TAG → $NEXT_VERSION]($COMPARE_URL)"$'\n'
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to ${{ steps.next_version.outputs.version }}"
          git push origin HEAD

      - name: Create and push tag
        run: |
          TAG="v${{ steps.next_version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next_version.outputs.version }}
          name: ${{ inputs.release_title != '' && inputs.release_title || format('v{0}', steps.next_version.outputs.version) }}
          body: ${{ steps.changelog.body }}
          files: build/libs/GeoLocate-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
