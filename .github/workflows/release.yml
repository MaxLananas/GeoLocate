name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_title:
        description: 'Release title (optional, defaults to version)'
        required: false
        default: ''

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute next version
        id: next_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^version=.*/version=${{ steps.next_version.outputs.version }}/" gradle.properties

      - name: Build
        run: ./gradlew build --no-daemon --parallel --build-cache

      - name: Generate release notes
        id: notes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_VERSION: v${{ steps.next_version.outputs.version }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            RAW_COMMITS=$(git log --pretty=format:"%H %s %an" HEAD)
            RANGE_LABEL="Initial release — full history"
            COMPARE_LINE="**Full history:** [All commits](https://github.com/${REPO}/commits/${NEXT_VERSION})"
          else
            RAW_COMMITS=$(git log --pretty=format:"%H %s %an" "${PREVIOUS_TAG}..HEAD")
            RANGE_LABEL="Changes since ${PREVIOUS_TAG}"
            COMPARE_LINE="**Full diff:** [${PREVIOUS_TAG} → ${NEXT_VERSION}](https://github.com/${REPO}/compare/${PREVIOUS_TAG}...${NEXT_VERSION})"
          fi

          COMMIT_LIST_MD=""
          COMMIT_LIST_PLAIN=""

          while IFS= read -r LINE; do
            [ -z "$LINE" ] && continue
            HASH=$(echo "$LINE" | awk '{print $1}')
            SHORT="${HASH:0:7}"
            AUTHOR=$(echo "$LINE" | awk '{print $NF}')
            MESSAGE=$(echo "$LINE" | awk '{$1=""; $NF=""; print}' | xargs)
            URL="https://github.com/${REPO}/commit/${HASH}"
            COMMIT_LIST_MD+="- [\`${SHORT}\`](${URL}) **${MESSAGE}** — ${AUTHOR}"$'\n'
            COMMIT_LIST_PLAIN+="- [${SHORT}] ${MESSAGE} (by ${AUTHOR})"$'\n'
          done <<< "$RAW_COMMITS"

          PROMPT="You are a senior software engineer writing professional release notes for a Java Paper Minecraft plugin library called GeoLocate. GeoLocate maps Minecraft block coordinates to real-world latitude and longitude with Google Maps links. Write a concise, technical, and professional release description in English for version ${NEXT_VERSION}. Here are the commits included in this release: ${COMMIT_LIST_PLAIN} Write 2 to 4 short paragraphs. Be precise and technical. Do not use emojis. Do not repeat the commit list. Focus on what changed functionally and why it matters to developers using the library. Output only the description text, no title, no markdown headers."

          PAYLOAD=$(jq -n \
            --arg model "llama3-70b-8192" \
            --arg prompt "$PROMPT" \
            '{
              model: $model,
              messages: [{role: "user", content: $prompt}],
              temperature: 0.4,
              max_tokens: 512
            }')

          RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No AI description available."')

          JITPACK_URL="https://jitpack.io/#${REPO}/${NEXT_VERSION}"
          WIKI_URL="https://github.com/${REPO}/wiki"

          if [ -n "$RELEASE_TITLE" ]; then
            DISPLAY_NAME="$RELEASE_TITLE"
          else
            DISPLAY_NAME="GeoLocate ${NEXT_VERSION}"
          fi

          BODY_FILE=$(mktemp)

          {
            printf '%s\n\n' "$AI_TEXT"
            printf '---\n\n'
            printf '### %s\n\n' "$RANGE_LABEL"
            printf '%s\n' "$COMMIT_LIST_MD"
            printf '---\n\n'
            printf '%s\n\n' "$COMPARE_LINE"
            printf '---\n\n'
            printf '### Using GeoLocate in your project\n\n'
            printf '```kotlin\n'
            printf 'repositories {\n'
            printf '    maven("https://jitpack.io")\n'
            printf '}\n\n'
            printf 'dependencies {\n'
            printf '    compileOnly("com.github.%s:GeoLocate:%s")\n' "$OWNER" "$NEXT_VERSION"
            printf '}\n'
            printf '```\n\n'
            printf '- [JitPack](%s)\n' "$JITPACK_URL"
            printf '- [Documentation / Wiki](%s)\n' "$WIKI_URL"
          } > "$BODY_FILE"

          echo "body_file=$BODY_FILE" >> $GITHUB_OUTPUT
          echo "display_name=$DISPLAY_NAME" >> $GITHUB_OUTPUT
          echo "tag=${NEXT_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore(release): bump version to ${{ steps.next_version.outputs.version }}"
          git push origin HEAD

      - name: Create and push tag
        run: |
          git tag "${{ steps.notes.outputs.tag }}"
          git push origin "${{ steps.notes.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.display_name }}
          body_path: ${{ steps.notes.outputs.body_file }}
          files: build/libs/GeoLocate-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
