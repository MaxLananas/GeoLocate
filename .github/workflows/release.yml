name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_title:
        description: 'Release title (optional, defaults to version)'
        required: false
        default: ''

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute next version
        id: next_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^version=.*/version=${{ steps.next_version.outputs.version }}/" gradle.properties

      - name: Build
        run: ./gradlew build --no-daemon --parallel --build-cache

      - name: Generate release notes
        id: notes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_VERSION: v${{ steps.next_version.outputs.version }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            RAW_COMMITS=$(git log --pretty=format:"%H %s %an" HEAD)
            RANGE_LABEL="Initial release — full history"
            COMPARE_LINE="**Full history:** [All commits](https://github.com/${REPO}/commits/${NEXT_VERSION})"
          else
            RAW_COMMITS=$(git log --pretty=format:"%H %s %an" "${PREVIOUS_TAG}..HEAD")
            RANGE_LABEL="Changes since ${PREVIOUS_TAG}"
            COMPARE_LINE="**Full diff:** [${PREVIOUS_TAG} -> ${NEXT_VERSION}](https://github.com/${REPO}/compare/${PREVIOUS_TAG}...${NEXT_VERSION})"
          fi

          COMMIT_LIST_MD=""
          COMMIT_LIST_PLAIN=""

          while IFS= read -r LINE; do
            [ -z "$LINE" ] && continue
            HASH=$(echo "$LINE" | awk '{print $1}')
            SHORT="${HASH:0:7}"
            AUTHOR=$(echo "$LINE" | awk '{print $NF}')
            MESSAGE=$(echo "$LINE" | awk '{$1=""; $NF=""; print}' | xargs)
            URL="https://github.com/${REPO}/commit/${HASH}"
            COMMIT_LIST_MD="${COMMIT_LIST_MD}- [\`${SHORT}\`](${URL}) **${MESSAGE}** — ${AUTHOR}"$'\n'
            COMMIT_LIST_PLAIN="${COMMIT_LIST_PLAIN}* ${MESSAGE} (${AUTHOR})"$'\n'
          done <<< "$RAW_COMMITS"

          PROMPT="You are a senior software engineer writing professional GitHub release notes for a Java library called GeoLocate. GeoLocate is a Paper Minecraft plugin library that converts Minecraft block coordinates to real-world latitude and longitude and generates Google Maps links. Version ${NEXT_VERSION} includes the following changes: ${COMMIT_LIST_PLAIN} Write exactly 3 short paragraphs in plain English. Be technical and precise. Do not use emojis. Do not list the commits again. Focus on what changed and why it matters for developers integrating this library. Output only the paragraphs, no headers, no markdown formatting."

          PAYLOAD=$(jq -n \
            --arg model "llama-3.1-8b-instant" \
            --arg content "$PROMPT" \
            '{
              model: $model,
              messages: [{ role: "user", content: $content }],
              temperature: 0.3,
              max_tokens: 400
            }')

          RESPONSE=$(curl -s \
            -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Groq raw response: $RESPONSE"

          AI_TEXT=$(echo "$RESPONSE" | jq -r 'if .choices then .choices[0].message.content else .error.message end // "AI description unavailable."')

          if [ -z "$AI_TEXT" ] || [ "$AI_TEXT" = "null" ]; then
            AI_TEXT="This release includes internal improvements and bug fixes."
          fi

          JITPACK_URL="https://jitpack.io/#${REPO}/${NEXT_VERSION}"
          WIKI_URL="https://github.com/${REPO}/wiki"

          if [ -n "$RELEASE_TITLE" ]; then
            DISPLAY_NAME="$RELEASE_TITLE"
          else
            DISPLAY_NAME="GeoLocate ${NEXT_VERSION}"
          fi

          BODY_FILE=$(mktemp)

          {
            echo "$AI_TEXT"
            echo ""
            echo "---"
            echo ""
            echo "### ${RANGE_LABEL}"
            echo ""
            echo "$COMMIT_LIST_MD"
            echo "---"
            echo ""
            echo "$COMPARE_LINE"
            echo ""
            echo "---"
            echo ""
            echo "### Using GeoLocate in your project"
            echo ""
            echo '```kotlin'
            echo 'repositories {'
            echo '    maven("https://jitpack.io")'
            echo '}'
            echo ''
            echo 'dependencies {'
            echo "    compileOnly(\"com.github.${OWNER}:GeoLocate:${NEXT_VERSION}\")"
            echo '}'
            echo '```'
            echo ""
            echo "- [JitPack](${JITPACK_URL})"
            echo "- [Documentation / Wiki](${WIKI_URL})"
          } > "$BODY_FILE"

          echo "body_file=$BODY_FILE" >> $GITHUB_OUTPUT
          echo "display_name=$DISPLAY_NAME" >> $GITHUB_OUTPUT
          echo "tag=${NEXT_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore(release): bump version to ${{ steps.next_version.outputs.version }}"
          git push origin HEAD

      - name: Create and push tag
        run: |
          git tag "${{ steps.notes.outputs.tag }}"
          git push origin "${{ steps.notes.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.display_name }}
          body_path: ${{ steps.notes.outputs.body_file }}
          files: build/libs/GeoLocate-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
