name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (semver)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_title:
        description: 'Release title (optional, defaults to version tag)'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (skip git push and GitHub release creation)'
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Read current version from gradle.properties
        id: current_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not read version from gradle.properties"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Compute next semantic version
        id: next_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Invalid version format: $CURRENT"
            exit 1
          fi

          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT"    >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Update version in gradle.properties
        run: |
          NEXT="${{ steps.next_version.outputs.version }}"
          sed -i "s/^version=.*/version=${NEXT}/" gradle.properties
          grep "^version=" gradle.properties

      - name: Build release artifact
        run: ./gradlew build --no-daemon --parallel --build-cache

      - name: Verify JAR artifact exists
        run: |
          JAR_COUNT=$(ls build/libs/GeoLocate-*.jar 2>/dev/null | wc -l)
          if [ "$JAR_COUNT" -eq 0 ]; then
            echo "ERROR: No JAR artifact found in build/libs/"
            exit 1
          fi
          echo "Found $JAR_COUNT JAR file(s):"
          ls -lh build/libs/GeoLocate-*.jar

      - name: Collect git commit data
        id: commits
        env:
          REPO: ${{ github.repository }}
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -n 1 || true)

          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"%H%x1F%s%x1F%an" HEAD > /tmp/raw_commits.txt
            echo "range_label=Initial release — full commit history" >> "$GITHUB_OUTPUT"
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
          else
            git log --pretty=format:"%H%x1F%s%x1F%an" "${PREVIOUS_TAG}..HEAD" > /tmp/raw_commits.txt
            echo "range_label=Changes since ${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
            echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          fi

          COMMIT_COUNT=$(wc -l < /tmp/raw_commits.txt || echo 0)
          echo "Collected $COMMIT_COUNT commit(s)."

      - name: Call Groq API and build release notes
        id: notes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_VERSION: v${{ steps.next_version.outputs.version }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          RANGE_LABEL: ${{ steps.commits.outputs.range_label }}
          PREVIOUS_TAG: ${{ steps.commits.outputs.previous_tag }}
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import subprocess
          import urllib.request
          import urllib.error
          import time
          import tempfile

          next_version  = os.environ["NEXT_VERSION"]
          release_title = os.environ.get("RELEASE_TITLE", "").strip()
          repo          = os.environ["REPO"]
          owner         = os.environ["OWNER"]
          range_label   = os.environ["RANGE_LABEL"]
          previous_tag  = os.environ.get("PREVIOUS_TAG", "").strip()
          groq_api_key  = os.environ["GROQ_API_KEY"]

          # Read commits written by the previous step (field separator = \x1F)
          commits = []
          try:
              with open("/tmp/raw_commits.txt", "r", encoding="utf-8") as f:
                  for line in f:
                      line = line.rstrip("\n")
                      if not line:
                          continue
                      parts = line.split("\x1f")
                      if len(parts) < 3:
                          continue
                      sha, subject, author = parts[0], parts[1], "\x1f".join(parts[2:])
                      commits.append({"sha": sha, "subject": subject, "author": author})
          except FileNotFoundError:
              pass

          if not commits:
              commits = [{"sha": "0000000", "subject": "chore: no changes", "author": "unknown"}]

          # Categorise commits by conventional commit type
          import re
          BREAKING_RE = re.compile(r'^[a-z]+(\([^)]+\))?!:')
          TYPE_RE     = re.compile(r'^([a-z]+)(?:\([^)]+\))?!?:')

          categories = {
              "feat": [], "fix": [], "perf": [],
              "refactor": [], "break": [], "other": []
          }
          commit_lines = []

          for c in commits:
              sha     = c["sha"]
              short   = sha[:7]
              subject = c["subject"]
              author  = c["author"]
              url     = f"https://github.com/{repo}/commit/{sha}"

              commit_lines.append(f"- [`{short}`]({url}) {subject} — **{author}**")

              if BREAKING_RE.match(subject):
                  categories["break"].append(subject)

              m = TYPE_RE.match(subject)
              t = m.group(1) if m else ""
              if   t == "feat":     categories["feat"].append(subject)
              elif t == "fix":      categories["fix"].append(subject)
              elif t == "perf":     categories["perf"].append(subject)
              elif t == "refactor": categories["refactor"].append(subject)
              else:                 categories["other"].append(subject)

          def fmt_list(items):
              return "\n".join(items) if items else "none"

          # Build Groq prompt
          prompt = f"""You are a principal software engineer and technical writer. \
          You are writing the official release notes for GeoLocate {next_version}, a production-grade \
          Paper Minecraft server plugin (1.21.10+, Java 21) that converts Minecraft block coordinates \
          (X/Z) to real-world WGS84 latitude/longitude using configurable Mercator or Linear map \
          projections. The plugin exposes a public Java API, Bukkit events, PlaceholderAPI integration, \
          and a coordinate caching layer backed by StampedLock and ConcurrentHashMap.

          Your output will be published verbatim on the GitHub Releases page and read by experienced \
          Java developers integrating this library into their own plugins.

          Hard constraints:
          - Write exactly 3 paragraphs, no headers, no bullet points, no markdown formatting of any kind
          - Each paragraph must contain exactly 4 sentences
          - Be extremely technical and precise
          - Mention concrete, observable improvements: thread safety guarantees, cache eviction behavior, API surface changes, event lifecycle, data format compatibility
          - Do not repeat or paraphrase the commit list
          - Do not use emojis, exclamation marks used for excitement, or filler phrases such as 'exciting', 'happy to announce', 'we are pleased'
          - Do not start any sentence with 'This release'
          - Write in the third person, past tense

          New features:
          {fmt_list(categories['feat'])}

          Bug fixes:
          {fmt_list(categories['fix'])}

          Performance improvements:
          {fmt_list(categories['perf'])}

          Refactoring:
          {fmt_list(categories['refactor'])}

          Breaking changes:
          {fmt_list(categories['break'])}

          Other changes:
          {fmt_list(categories['other'])}"""

          # Call Groq API with up to 3 retries
          ai_text = None
          payload = json.dumps({
              "model": "llama-3.3-70b-versatile",
              "messages": [{"role": "user", "content": prompt}],
              "temperature": 0.15,
              "max_tokens": 700,
              "top_p": 0.9
          }).encode("utf-8")

          for attempt in range(1, 4):
              try:
                  req = urllib.request.Request(
                      "https://api.groq.com/openai/v1/chat/completions",
                      data=payload,
                      headers={
                          "Authorization": f"Bearer {groq_api_key}",
                          "Content-Type": "application/json"
                      },
                      method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = json.loads(resp.read().decode("utf-8"))
                      ai_text = body["choices"][0]["message"]["content"].strip()
                      print(f"Groq attempt {attempt} — HTTP 200")
                      break
              except Exception as exc:
                  print(f"Groq attempt {attempt} — error: {exc}")
                  if attempt < 3:
                      time.sleep(attempt * 3)

          if not ai_text:
              ai_text = (
                  "Internal improvements, performance optimisations, and stability fixes "
                  "were applied across multiple subsystems. "
                  "Refer to the categorised changelog and commit list below for a complete "
                  "account of changes introduced in this release."
              )

          # Build compare line
          if previous_tag:
              compare_line = (
                  f"**Full diff:** [`{previous_tag}` -> `{next_version}`]"
                  f"(https://github.com/{repo}/compare/{previous_tag}...{next_version})"
              )
          else:
              compare_line = (
                  f"**Repository:** [View all commits]"
                  f"(https://github.com/{repo}/commits/main)"
              )

          jitpack_url = f"https://jitpack.io/#{repo}/{next_version}"
          wiki_url    = f"https://github.com/{repo}/wiki"
          display_name = release_title if release_title else f"GeoLocate {next_version}"

          # Build markdown sections
          def md_section(title, items):
              if not items:
                  return ""
              lines = [f"#### {title}", ""]
              for item in items:
                  lines.append(f"- {item}")
              lines.append("")
              return "\n".join(lines) + "\n"

          sections = (
              md_section("Breaking Changes", categories["break"]) +
              md_section("New Features",     categories["feat"])  +
              md_section("Bug Fixes",        categories["fix"])   +
              md_section("Performance",      categories["perf"])  +
              md_section("Refactoring",      categories["refactor"]) +
              md_section("Other",            categories["other"])
          )

          commit_md = "\n".join(commit_lines)

          body = f"""{ai_text}

---

### {range_label}

{sections}
#### All Commits

{commit_md}

---

{compare_line}

---

### Installation

**Gradle (Kotlin DSL)**

```kotlin
repositories {{
    maven("https://jitpack.io")
}}

dependencies {{
    compileOnly("com.github.{owner}:GeoLocate:{next_version}")
}}
```

**Gradle (Groovy DSL)**

```groovy
repositories {{
    maven {{ url 'https://jitpack.io' }}
}}

dependencies {{
    compileOnly 'com.github.{owner}:GeoLocate:{next_version}'
}}
```

**plugin.yml**

```yaml
depend:
  - GeoLocate
```

| Resource | Link |
|---|---|
| JitPack | [com.github.{owner}:GeoLocate:{next_version}]({jitpack_url}) |
| Wiki | [Documentation]({wiki_url}) |
| API | [GeoLocateAPI.java](https://github.com/{repo}/blob/main/src/main/java/dev/geolocate/api/GeoLocateAPI.java) |
| Commands | [Commands](https://github.com/{repo}/wiki/Commands) |
| Configuration | [Configuration](https://github.com/{repo}/wiki/Configuration) |
"""

          # Write body to temp file
          body_file = tempfile.NamedTemporaryFile(
              mode="w", suffix=".md", delete=False, encoding="utf-8"
          )
          body_file.write(body)
          body_file.close()

          print(f"Release body written to: {body_file.name}")

          # Write outputs
          github_output = os.environ.get("GITHUB_OUTPUT", "")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as out:
                  out.write(f"body_file={body_file.name}\n")
                  out.write(f"display_name={display_name}\n")

          PYEOF

      - name: Commit version bump
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore(release): bump version to ${{ steps.next_version.outputs.version }} [skip ci]"
          git push origin HEAD

      - name: Create and push version tag
        if: ${{ inputs.dry_run == false }}
        run: |
          TAG="${{ steps.next_version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tag $TAG pushed."

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.tag }}
          name: ${{ steps.notes.outputs.display_name }}
          body_path: ${{ steps.notes.outputs.body_file }}
          files: build/libs/GeoLocate-*.jar
          draft: false
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "=== DRY RUN — no changes pushed ==="
          echo "Would release: ${{ steps.next_version.outputs.tag }}"
          echo "Display name:  ${{ steps.notes.outputs.display_name }}"
          echo "Body preview:"
          cat "${{ steps.notes.outputs.body_file }}"
