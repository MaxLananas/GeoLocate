name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_title:
        description: 'Release title (optional, defaults to version)'
        required: false
        default: ''

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute next version
        id: next_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^version=.*/version=${{ steps.next_version.outputs.version }}/" gradle.properties

      - name: Build
        run: ./gradlew build --no-daemon --parallel --build-cache

      - name: Collect commits
        id: commits
        run: |
          REPO="${{ github.repository }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            RAW=$(git log --pretty=format:"%H|%s|%an" HEAD)
            RANGE_LABEL="Initial release — full history"
          else
            RAW=$(git log --pretty=format:"%H|%s|%an" "$PREVIOUS_TAG"..HEAD)
            RANGE_LABEL="Changes since $PREVIOUS_TAG"
          fi

          COMMIT_LIST=""
          COMMIT_LIST_PLAIN=""

          while IFS='|' read -r HASH MESSAGE AUTHOR; do
            [ -z "$HASH" ] && continue
            SHORT="${HASH:0:7}"
            URL="https://github.com/$REPO/commit/$HASH"
            COMMIT_LIST+="- [\`$SHORT\`]($URL) **$MESSAGE** — $AUTHOR"$'\n'
            COMMIT_LIST_PLAIN+="- [$SHORT] $MESSAGE (by $AUTHOR)"$'\n'
          done <<< "$RAW"

          {
            echo "list<<COMMITS_EOF"
            printf '%s' "$COMMIT_LIST"
            echo ""
            echo "COMMITS_EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "plain<<PLAIN_EOF"
            printf '%s' "$COMMIT_LIST_PLAIN"
            echo ""
            echo "PLAIN_EOF"
          } >> $GITHUB_OUTPUT

          echo "range=$RANGE_LABEL" >> $GITHUB_OUTPUT
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Generate AI description
        id: ai
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          NEXT_VERSION="v${{ steps.next_version.outputs.version }}"
          COMMITS_PLAIN="${{ steps.commits.outputs.plain }}"
          TITLE="${{ inputs.release_title }}"

          PROMPT="You are a senior software engineer writing professional release notes for a Java Paper Minecraft plugin library called GeoLocate. GeoLocate maps Minecraft block coordinates to real-world latitude and longitude with Google Maps links. Write a concise, technical, and professional release description in English for version $NEXT_VERSION. The title is: '$TITLE'. Here are the commits included in this release:\n$COMMITS_PLAIN\n\nWrite 2 to 4 short paragraphs. Be precise and technical. Do not use emojis. Do not repeat the commit list. Focus on what changed functionally and why it matters to developers using the library. Output only the description text, no title, no markdown headers."

          PAYLOAD=$(jq -n \
            --arg model "llama3-70b-8192" \
            --arg prompt "$PROMPT" \
            '{
              model: $model,
              messages: [{role: "user", content: $prompt}],
              temperature: 0.4,
              max_tokens: 512
            }')

          RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No AI description available."')

          {
            echo "description<<AI_EOF"
            printf '%s' "$AI_TEXT"
            echo ""
            echo "AI_EOF"
          } >> $GITHUB_OUTPUT

      - name: Build release body
        id: body
        run: |
          REPO="${{ github.repository }}"
          NEXT_VERSION="v${{ steps.next_version.outputs.version }}"
          PREVIOUS_TAG="${{ steps.commits.outputs.previous_tag }}"
          RANGE_LABEL="${{ steps.commits.outputs.range }}"
          AI_DESC="${{ steps.ai.outputs.description }}"
          COMMIT_LIST="${{ steps.commits.outputs.list }}"

          JITPACK_URL="https://jitpack.io/#$REPO/$NEXT_VERSION"
          WIKI_URL="https://github.com/$REPO/wiki"

          BODY=""
          BODY+="$AI_DESC"$'\n\n'
          BODY+="---"$'\n\n'
          BODY+="### $RANGE_LABEL"$'\n\n'
          BODY+="$COMMIT_LIST"$'\n'
          BODY+="---"$'\n\n'

          if [ -n "$PREVIOUS_TAG" ]; then
            COMPARE_URL="https://github.com/$REPO/compare/$PREVIOUS_TAG...$NEXT_VERSION"
            BODY+="**Full diff:** [$PREVIOUS_TAG → $NEXT_VERSION]($COMPARE_URL)"$'\n\n'
          else
            BODY+="**Full history:** [All commits](https://github.com/$REPO/commits/$NEXT_VERSION)"$'\n\n'
          fi

          BODY+="---"$'\n\n'
          BODY+="### Using GeoLocate in your project"$'\n\n'
          BODY+='```kotlin'$'\n'
          BODY+="repositories {"$'\n'
          BODY+="    maven(\"https://jitpack.io\")"$'\n'
          BODY+="}"$'\n\n'
          BODY+="dependencies {"$'\n'
          BODY+="    compileOnly(\"com.github.${{ github.repository_owner }}:GeoLocate:$NEXT_VERSION\")"$'\n'
          BODY+="}"$'\n'
          BODY+='```'$'\n\n'
          BODY+="- [JitPack]($JITPACK_URL)"$'\n'
          BODY+="- [Documentation / Wiki]($WIKI_URL)"$'\n'

          {
            echo "body<<BODY_EOF"
            printf '%s' "$BODY"
            echo ""
            echo "BODY_EOF"
          } >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore(release): bump version to ${{ steps.next_version.outputs.version }}"
          git push origin HEAD

      - name: Create and push tag
        run: |
          TAG="v${{ steps.next_version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next_version.outputs.version }}
          name: ${{ inputs.release_title != '' && inputs.release_title || format('GeoLocate v{0}', steps.next_version.outputs.version) }}
          body: ${{ steps.body.outputs.body }}
          files: build/libs/GeoLocate-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
