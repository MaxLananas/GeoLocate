name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_title:
        description: 'Release title (optional, defaults to version)'
        required: false
        default: ''

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute next version
        id: next_version
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^version=.*/version=${{ steps.next_version.outputs.version }}/" gradle.properties

      - name: Build
        run: ./gradlew build --no-daemon --parallel --build-cache

      - name: Generate release notes
        id: notes
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_VERSION: v${{ steps.next_version.outputs.version }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

          if [ -z "$PREVIOUS_TAG" ]; then
            RAW_COMMITS=$(git log --pretty=format:"%H %s %an" HEAD)
            RANGE_LABEL="Initial release — full history"
            COMPARE_LINE="**Full diff:** [View all commits](https://github.com/${REPO}/commits/${NEXT_VERSION})"
          else
            RAW_COMMITS=$(git log --pretty=format:"%H %s %an" "${PREVIOUS_TAG}..HEAD")
            RANGE_LABEL="Changes since ${PREVIOUS_TAG}"
            COMPARE_LINE="**Full diff:** [\`${PREVIOUS_TAG}\` -> \`${NEXT_VERSION}\`](https://github.com/${REPO}/compare/${PREVIOUS_TAG}...${NEXT_VERSION})"
          fi

          COMMIT_LIST_MD=""
          FEAT_LIST=""
          FIX_LIST=""
          PERF_LIST=""
          REFACTOR_LIST=""
          OTHER_LIST=""

          while IFS= read -r LINE; do
            [ -z "$LINE" ] && continue
            HASH=$(echo "$LINE" | awk '{print $1}')
            SHORT="${HASH:0:7}"
            AUTHOR=$(echo "$LINE" | awk '{print $NF}')
            MESSAGE=$(echo "$LINE" | awk '{$1=""; $NF=""; print}' | xargs)
            URL="https://github.com/${REPO}/commit/${HASH}"

            TYPE=$(echo "$MESSAGE" | grep -oP '^(feat|fix|perf|refactor|chore|docs|style|test)' || true)

            COMMIT_LIST_MD="${COMMIT_LIST_MD}- [\`${SHORT}\`](${URL}) ${MESSAGE} — **${AUTHOR}**"$'\n'

            case "$TYPE" in
              feat)     FEAT_LIST="${FEAT_LIST}${MESSAGE}"$'\n' ;;
              fix)      FIX_LIST="${FIX_LIST}${MESSAGE}"$'\n' ;;
              perf)     PERF_LIST="${PERF_LIST}${MESSAGE}"$'\n' ;;
              refactor) REFACTOR_LIST="${REFACTOR_LIST}${MESSAGE}"$'\n' ;;
              *)        OTHER_LIST="${OTHER_LIST}${MESSAGE}"$'\n' ;;
            esac
          done <<< "$RAW_COMMITS"

          PROMPT="You are a principal software engineer and technical writer. You are writing the official release notes for GeoLocate ${NEXT_VERSION}, a production-grade Java library for Paper Minecraft servers (1.21.10+, Java 21). GeoLocate converts Minecraft block coordinates (X/Z) to real-world WGS84 latitude/longitude using configurable Mercator or Linear projections, and generates Google Maps, OpenStreetMap and Apple Maps deep links.

          Your output will be published verbatim on the GitHub Releases page. It must be read by experienced Java developers who integrate this library into their plugins.

          Constraints:
          - Write exactly 3 paragraphs, no headers, no bullet points, no markdown formatting
          - Each paragraph must be 3 to 5 sentences
          - Be extremely technical and precise
          - Reference specific class names, method signatures, interface contracts, or algorithmic changes where relevant
          - Mention concrete improvements: thread safety, cache behavior, API surface, event contracts, data formats
          - Do not repeat the commit list
          - Do not use emojis
          - Do not use generic filler phrases
          - Write as if you deeply understand every line of the codebase

          New features:
          ${FEAT_LIST}

          Bug fixes:
          ${FIX_LIST}

          Performance improvements:
          ${PERF_LIST}
 
          Refactoring:
          ${REFACTOR_LIST}

          Other changes:
          ${OTHER_LIST}"

          PAYLOAD=$(jq -n \
            --arg model "llama-3.1-8b-instant" \
            --arg content "$PROMPT" \
            '{
              model: $model,
              messages: [{ role: "user", content: $content }],
              temperature: 0.2,
              max_tokens: 600
            }')

          RESPONSE=$(curl -s \
            -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Groq raw response: $RESPONSE"

          AI_TEXT=$(echo "$RESPONSE" | jq -r 'if .choices then .choices[0].message.content else .error.message end // ""')

          if [ -z "$AI_TEXT" ] || [ "$AI_TEXT" = "null" ]; then
            AI_TEXT="Internal improvements and stability fixes. See commit list below for details."
          fi

          JITPACK_URL="https://jitpack.io/#${REPO}/${NEXT_VERSION}"
          WIKI_URL="https://github.com/${REPO}/wiki"

          if [ -n "$RELEASE_TITLE" ]; then
            DISPLAY_NAME="$RELEASE_TITLE"
          else
            DISPLAY_NAME="GeoLocate ${NEXT_VERSION}"
          fi

          BODY_FILE=$(mktemp)

          {
            printf '%s\n' "$AI_TEXT"
            printf '\n---\n\n'
            printf '### %s\n\n' "$RANGE_LABEL"

            if [ -n "$FEAT_LIST" ]; then
              printf '#### New Features\n'
              while IFS= read -r ITEM; do
                [ -z "$ITEM" ] && continue
                printf -- '- %s\n' "$ITEM"
              done <<< "$FEAT_LIST"
              printf '\n'
            fi

            if [ -n "$FIX_LIST" ]; then
              printf '#### Bug Fixes\n'
              while IFS= read -r ITEM; do
                [ -z "$ITEM" ] && continue
                printf -- '- %s\n' "$ITEM"
              done <<< "$FIX_LIST"
              printf '\n'
            fi

            if [ -n "$PERF_LIST" ]; then
              printf '#### Performance\n'
              while IFS= read -r ITEM; do
                [ -z "$ITEM" ] && continue
                printf -- '- %s\n' "$ITEM"
              done <<< "$PERF_LIST"
              printf '\n'
            fi

            if [ -n "$REFACTOR_LIST" ]; then
              printf '#### Refactoring\n'
              while IFS= read -r ITEM; do
                [ -z "$ITEM" ] && continue
                printf -- '- %s\n' "$ITEM"
              done <<< "$REFACTOR_LIST"
              printf '\n'
            fi

            if [ -n "$OTHER_LIST" ]; then
              printf '#### Other\n'
              while IFS= read -r ITEM; do
                [ -z "$ITEM" ] && continue
                printf -- '- %s\n' "$ITEM"
              done <<< "$OTHER_LIST"
              printf '\n'
            fi

            printf '#### All Commits\n\n'
            printf '%s\n' "$COMMIT_LIST_MD"
            printf '\n---\n\n'
            printf '%s\n' "$COMPARE_LINE"
            printf '\n---\n\n'
            printf '### Installation\n\n'
            printf '```kotlin\n'
            printf '// build.gradle.kts\n'
            printf 'repositories {\n'
            printf '    maven("https://jitpack.io")\n'
            printf '}\n\n'
            printf 'dependencies {\n'
            printf '    compileOnly("com.github.%s:GeoLocate:%s")\n' "$OWNER" "$NEXT_VERSION"
            printf '}\n'
            printf '```\n\n'
            printf '```yaml\n'
            printf '# plugin.yml\n'
            printf 'depend:\n'
            printf '  - GeoLocate\n'
            printf '```\n\n'
            printf '| Resource | Link |\n'
            printf '|---|---|\n'
            printf '| JitPack | [com.github.%s:GeoLocate:%s](%s) |\n' "$OWNER" "$NEXT_VERSION" "$JITPACK_URL"
            printf '| Wiki | [Documentation](%s) |\n' "$WIKI_URL"
            printf '| API | [GeoLocateAPI.java](https://github.com/%s/blob/main/src/main/java/dev/geolocate/api/GeoLocateAPI.java) |\n' "$REPO"
          } > "$BODY_FILE"

          echo "body_file=$BODY_FILE" >> $GITHUB_OUTPUT
          echo "display_name=$DISPLAY_NAME" >> $GITHUB_OUTPUT
          echo "tag=${NEXT_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore(release): bump version to ${{ steps.next_version.outputs.version }}"
          git push origin HEAD

      - name: Create and push tag
        run: |
          git tag "${{ steps.notes.outputs.tag }}"
          git push origin "${{ steps.notes.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.display_name }}
          body_path: ${{ steps.notes.outputs.body_file }}
          files: build/libs/GeoLocate-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
