name: GeoLocate
version: ${version}
main: dev.geolocate.GeoLocate
description: ${description}
api-version: '1.21'
authors:
  - MaxLananas
website: https://github.com/MaxLananas/GeoLocate

softdepend:
  - PlaceholderAPI

commands:
  geolocate:
    description: Get your real-world coordinates from your Minecraft position
    usage: /geolocate [player]
    aliases: [geo, coords]
    permission: geolocate.use
  geoadmin:
    description: Manage GeoLocate settings
    usage: /geoadmin <reload|info|clearcache|stats>
    permission: geolocate.admin
  geoconvert:
    description: Convert real-world coordinates to Minecraft block position
    usage: /geoconvert <latitude> <longitude>
    aliases: [geoconv]
    permission: geolocate.use
  geodistance:
    description: Get the real-world distance between two players
    usage: /geodistance <player>
    aliases: [geodist]
    permission: geolocate.use
  geonotify:
    description: Toggle move notifications for yourself
    usage: /geonotify
    permission: geolocate.notify.toggle
  geoactionbar:
    description: Toggle the actionbar live display for yourself
    usage: /geoactionbar
    permission: geolocate.actionbar
  geopath:
    description: View and manage your geo movement history
    usage: /geopath <info|clear|snap>
    aliases: [gpath]
    permission: geolocate.use
  georegion:
    description: View geo-region information
    usage: /georegion <current|list|info <name>>
    aliases: [gregion]
    permission: geolocate.use
  geomatrix:
    description: Show real-world distance matrix between online players
    usage: /geomatrix [player]
    aliases: [gmatrix]
    permission: geolocate.use
  geoexport:
    description: Export your geo history to a file
    usage: /geoexport <csv|geojson|gpx|kml>
    aliases: [gexport]
    permission: geolocate.use
  geostats:
    description: Show GeoLocate runtime statistics
    usage: /geostats
    aliases: [gstats]
    permission: geolocate.admin

permissions:
  geolocate.use:
    description: Use /geolocate, /geoconvert, /geodistance, /geopath, /georegion, /geomatrix, /geoexport
    default: true
  geolocate.others:
    description: Check other players coordinates
    default: op
  geolocate.admin:
    description: Use admin commands
    default: op
  geolocate.notify:
    description: Receive automatic coordinate notifications on move
    default: false
  geolocate.notify.toggle:
    description: Toggle move notifications
    default: true
  geolocate.actionbar:
    description: Toggle the actionbar live display
    default: true
  geolocate.placeholderapi:
    description: Use GeoLocate PlaceholderAPI placeholders
    default: true
